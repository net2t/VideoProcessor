# ╔══════════════════════════════════════════════════════════════════╗
# ║   VideoProcessor — GitHub Actions Workflow                      ║
# ║                                                                  ║
# ║   Triggers:                                                      ║
# ║     • Scheduled : daily at 08:00 UTC (1:00 PM Pakistan)        ║
# ║     • Manual    : Actions tab → Run workflow → any browser      ║
# ╚══════════════════════════════════════════════════════════════════╝

name: 🎬 Process Videos

on:
  schedule:
    # 08:00 UTC = 1:00 PM Pakistan Standard Time (UTC+5)
    # Change this to your preferred time. Format: minute hour day month weekday
    # More examples:
    #   "0 3 * * *"   = 8:00 AM Pakistan
    #   "0 15 * * *"  = 8:00 PM Pakistan
    #   "0 8 * * 1-5" = Weekdays only at 1:00 PM Pakistan
    - cron: "0 8 * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "cloud"
        type: choice
        options:
          - cloud
      dry_run:
        description: "Dry run? (scan only — no changes)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      max_videos:
        description: "Max videos to process (blank = all)"
        required: false
        default: ""
      trim_seconds:
        description: "Seconds to trim from end"
        required: false
        default: "4"
      logo_x:
        description: "Logo X position (pixels from left)"
        required: false
        default: "7"
      logo_y:
        description: "Logo Y position (pixels from top)"
        required: false
        default: "5"
      logo_width:
        description: "Logo width in pixels"
        required: false
        default: "300"
      endscreen_enabled:
        description: "Enable endscreen?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      endscreen_duration:
        description: "Endscreen duration (seconds or 'auto')"
        required: false
        default: "auto"

jobs:
  process:
    name: 🎬 Logo + Trim + Upload
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hour max (GitHub Actions limit)

    steps:

      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            gspread \
            google-auth \
            google-api-python-client \
            google-auth-httplib2 \
            google-auth-oauthlib \
            requests \
            python-dotenv \
            imageio-ffmpeg

      - name: 🎬 Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 🔧 Verify FFmpeg
        run: |
          ffmpeg -version | head -1
          ffprobe -version | head -1
          echo "✅ FFmpeg ready"

      - name: 🔐 Write OAuth credentials from secret
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > auth.json
          echo "✅ auth.json ready ($(wc -c < auth.json) bytes)"

      - name: ⚙️ Write .env config
        run: |
          TRIM="${{ github.event.inputs.trim_seconds }}"
          LX="${{ github.event.inputs.logo_x }}"
          LY="${{ github.event.inputs.logo_y }}"
          LW="${{ github.event.inputs.logo_width }}"
          END="${{ github.event.inputs.endscreen_enabled }}"
          ENDUR="${{ github.event.inputs.endscreen_duration }}"
          cat > .env << EOF
          SPREADSHEET_ID=${{ secrets.SPREADSHEET_ID }}
          GOOGLE_DRIVE_FOLDER_ID=${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          TRIM_SECONDS=${TRIM:-4}
          LOGO_PATH=assets/logo.png
          LOGO_X=${LX:-7}
          LOGO_Y=${LY:-5}
          LOGO_WIDTH=${LW:-300}
          LOGO_OPACITY=1.0
          ENDSCREEN_ENABLED=${END:-true}
          ENDSCREEN_VIDEO=assets/endscreen.mp4
          ENDSCREEN_DURATION=${ENDUR:-auto}
          EOF
          echo "✅ .env ready"

      - name: 🔍 Dry run — preview what will be processed
        run: python process.py --mode cloud --dry-run
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}

      - name: 🎬 Process videos (cloud mode)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          CMD="python process.py --mode cloud"
          MAX="${{ github.event.inputs.max_videos }}"
          [ -n "$MAX" ] && CMD="$CMD --max $MAX"
          echo "Command: $CMD"
          $CMD
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}

      - name: 🔍 Dry run only (if selected)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "⚠️ DRY RUN — no videos processed"
          python process.py --mode cloud --dry-run
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}

      - name: 🧹 Clean up secrets
        if: always()
        run: rm -f auth.json .env

      - name: 📊 Summary
        if: always()
        run: |
          echo "## 🎬 VideoProcessor Run" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trim seconds | ${{ github.event.inputs.trim_seconds || '4' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Logo X/Y | ${{ github.event.inputs.logo_x || '7' }} / ${{ github.event.inputs.logo_y || '5' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Logo width | ${{ github.event.inputs.logo_width || '300' }}px |" >> $GITHUB_STEP_SUMMARY
          echo "| Endscreen | ${{ github.event.inputs.endscreen_enabled || 'true' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Endscreen duration | ${{ github.event.inputs.endscreen_duration || 'auto' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry run | ${{ github.event.inputs.dry_run || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner OS | ubuntu-latest |" >> $GITHUB_STEP_SUMMARY
