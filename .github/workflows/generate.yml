name: MagicLight Video Generator
on:
  workflow_dispatch:
    inputs:
      max_stories:
        description: 'Amount of stories to process (0 for unlimited)'
        required: true
        default: '0'
      upload_drive:
        description: 'Upload immediately to Google Drive? (Requires DRIVE_FOLDER_ID in Repository Secrets)'
        type: boolean
        required: true
        default: true

jobs:
  run-generator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright gspread google-auth google-api-python-client rich python-dotenv requests
          playwright install --with-deps chromium

      - name: Map Credentials JSON
        run: echo '${{ secrets.CREDS_JSON_B64 }}' | base64 --decode > credentials.json

      - name: Run MagicLight Auto
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_NAME: ${{ secrets.SHEET_NAME }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
        run: |
          ARGS="--headless --max ${{ github.event.inputs.max_stories }}"
          if [ "${{ github.event.inputs.upload_drive }}" = "true" ]; then
            ARGS="$ARGS --upload-drive"
          fi
          python main.py $ARGS
